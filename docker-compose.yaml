version: '3.8'

services:
  nextjs-app:
    container_name: nextjs_web_app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time variables (NEXT_PUBLIC_ vars must be available at build time)
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      # Runtime environment variables (server-side only)
      NODE_ENV: production
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      # Add other server-side environment variables here
    env_file:
      - .env
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3

networks:
  app-network:
    driver: bridge
