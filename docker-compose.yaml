version: '3.8'

services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextjs-app.rule=Host(`koehon.jibaru.ink`)"
      - "traefik.http.routers.nextjs-app.entrypoints=websecure"
      - "traefik.http.routers.nextjs-app.tls=true"
      - "traefik.http.routers.nextjs-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.nextjs-app.loadbalancer.server.port=3000"
      - "traefik.http.routers.nextjs-app-http.rule=Host(`koehon.jibaru.ink`)"
      - "traefik.http.routers.nextjs-app-http.entrypoints=web"
      - "traefik.http.routers.nextjs-app-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

networks:
  dokploy-network:
    external: true
